global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'finbot-services'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'finbot.webapi:8080'
          - 'finbot.app:8080'
          - 'finbot.excel:8080'
        labels:
          stack: 'finbot'

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter-primary:9187'
          - 'postgres-exporter-replica:9187'
          - 'postgres-exporter-readonly:9187'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # MinIO scrape (auth bearer token нужно сгенерировать через 'mc admin prometheus generate'
  # и положить в файл /etc/prometheus/minio_bearer.token. Раскомментировать когда добавишь токен).
